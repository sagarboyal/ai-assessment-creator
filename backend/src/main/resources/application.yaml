server:
  port: 8080

spring:
  application:
    name: assessment-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/assesment-db}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

ai:
  groq:
    api-key: ${KEY}
    model: llama-3.3-70b-versatile
    url: https://api.groq.com/openai/v1/chat/completions

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
